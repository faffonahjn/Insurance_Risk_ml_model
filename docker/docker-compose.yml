version: "3.9"

services:

  insurance-risk-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: insurance-risk-api:latest
    container_name: insurance-risk-api
    ports:
      - "8000:8000"
    volumes:
      - ../logs:/app/logs
      - ../artifacts:/app/artifacts
    environment:
      - ENV=production
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  insurance-risk-ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streamlit
    image: insurance-risk-ui:latest
    container_name: insurance-risk-ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://insurance-risk-api:8000
    depends_on:
      insurance-risk-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
